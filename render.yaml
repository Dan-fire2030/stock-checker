services:
  - type: web
    name: stock-checker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FINNHUB_API_KEY
        sync: false
      - key: MARKETAUX_API_KEY
        sync: false
      - key: JQUANTS_REFRESH_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
